# Phase 0 minimal Prometheus: server + node exporter. No Alertmanager/pushgateway/
# kube-state-metrics -- not needed for the pilot fault signal or RO1-RO2 telemetry.
alertmanager:
  enabled: false
prometheus-pushgateway:
  enabled: false
prometheus-node-exporter:
  enabled: true
kube-state-metrics:
  enabled: false

server:
  persistentVolume:
    enabled: false

# NOTE: extraScrapeConfigs is a TOP-LEVEL chart value, not nested under server: —
# nesting it silently no-ops (helm applies without error, config just never renders).
extraScrapeConfigs: |
  - job_name: 'kafka-broker-jmx'
    kubernetes_sd_configs:
      - role: pod
        namespaces:
            names: ["kafka"]
    relabel_configs:
      - source_labels: [__meta_kubernetes_pod_label_strimzi_io_cluster]
        action: keep
        regex: kspfail
      - source_labels: [__meta_kubernetes_pod_container_port_name]
        action: keep
        regex: tcp-prometheus
      - source_labels: [__meta_kubernetes_pod_ip]
        action: replace
        regex: '(.+)'
        replacement: '${1}:9404'
        target_label: __address__
      - source_labels: [__meta_kubernetes_pod_name]
        target_label: kubernetes_pod_name

  - job_name: 'spark-driver'
    metrics_path: /metrics/executors/prometheus/
    kubernetes_sd_configs:
      - role: pod
        namespaces:
            names: ["spark"]
    relabel_configs:
      - source_labels: [__meta_kubernetes_pod_label_spark_role]
        action: keep
        regex: driver
      - source_labels: [__meta_kubernetes_pod_container_port_name]
        action: keep
        regex: spark-ui
      - source_labels: [__meta_kubernetes_pod_ip]
        action: replace
        regex: '(.+)'
        replacement: '${1}:4040'
        target_label: __address__
      - source_labels: [__meta_kubernetes_pod_name]
        target_label: kubernetes_pod_name
