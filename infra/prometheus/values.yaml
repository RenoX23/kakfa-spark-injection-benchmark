# Phase 0 minimal Prometheus: server only, no Alertmanager/pushgateway/node-exporter yet.
alertmanager:
  enabled: false
prometheus-pushgateway:
  enabled: false
prometheus-node-exporter:
  enabled: false
kube-state-metrics:
  enabled: false

server:
  persistentVolume:
    enabled: false

# NOTE: extraScrapeConfigs is a TOP-LEVEL chart value, not nested under server: —
# nesting it silently no-ops (helm applies without error, config just never renders).
extraScrapeConfigs: |
  - job_name: 'kafka-broker-jmx'
    kubernetes_sd_configs:
      - role: pod
        namespaces:
            names: ["kafka"]
    relabel_configs:
      - source_labels: [__meta_kubernetes_pod_label_strimzi_io_cluster]
        action: keep
        regex: kspfail
      - source_labels: [__meta_kubernetes_pod_container_port_name]
        action: keep
        regex: tcp-prometheus
      - source_labels: [__meta_kubernetes_pod_ip]
        action: replace
        regex: '(.+)'
        replacement: '${1}:9404'
        target_label: __address__
      - source_labels: [__meta_kubernetes_pod_name]
        target_label: kubernetes_pod_name
