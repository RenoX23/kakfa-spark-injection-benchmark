# Phase 0 minimal Prometheus: server + node exporter. Alertmanager/pushgateway still
# unneeded. kube-state-metrics was Phase-0-unneeded too, but re-enabled 2026-07-11:
# executor_oom's fault window (5-7s) is shorter than every other job's 60s scrape
# interval, so no continuous telemetry signal (Spark-level or cAdvisor-level) has ever
# captured it. kube-state-metrics exposes kube_pod_container_status_restarts_total and
# kube_pod_container_status_last_terminated_reason -- both COUNTERS/state, not gauges,
# so (unlike a memory gauge that can spike and fall between scrapes) an increment
# persists and should be visible on the next scrape regardless of exact timing, as long
# as the pod is scraped again before k8s garbage-collects it. See docs/research_context.md
# Section 11 for why this was tried before accepting a structural limitation.
alertmanager:
  enabled: false
prometheus-pushgateway:
  enabled: false
prometheus-node-exporter:
  enabled: true
kube-state-metrics:
  enabled: true

server:
  # Persistence enabled starting Weeks 4-5 (was disabled through Phase 0/Weeks 2-3,
  # where losing history on a pod restart didn't matter for one-off verification runs).
  # A multi-hour, N>=15-20-repetition fault-injection campaign is a different story --
  # losing the TSDB to a restart mid-campaign would lose the raw telemetry needed for
  # labeling, not just a convenience. Same lesson as the Kafka broker's ephemeral->
  # persistent-claim fix in Weeks 2-3.
  persistentVolume:
    enabled: true
    size: 4Gi

# NOTE: extraScrapeConfigs is a TOP-LEVEL chart value, not nested under server: —
# nesting it silently no-ops (helm applies without error, config just never renders).
extraScrapeConfigs: |
  - job_name: 'kafka-broker-jmx'
    # Global scrape_timeout (10s) was clipping network_degradation measurements: the
    # 2026-07-11 N=8 run showed 5/8 reps land in a tight 9.8-10.01s band right at the
    # ceiling, right where an unbounded degraded-network distribution wouldn't cluster.
    # Raised per-job so this class's fault severity (500ms delay/20% loss) has room to
    # produce a real, uncensored duration instead of being silently truncated. Global
    # scrape_interval is 1m, so 20s timeout is still well within budget.
    scrape_timeout: 20s
    kubernetes_sd_configs:
      - role: pod
        namespaces:
            names: ["kafka"]
    relabel_configs:
      - source_labels: [__meta_kubernetes_pod_label_strimzi_io_cluster]
        action: keep
        regex: kspfail
      - source_labels: [__meta_kubernetes_pod_container_port_name]
        action: keep
        regex: tcp-prometheus
      - source_labels: [__meta_kubernetes_pod_ip]
        action: replace
        regex: '(.+)'
        replacement: '${1}:9404'
        target_label: __address__
      - source_labels: [__meta_kubernetes_pod_name]
        target_label: kubernetes_pod_name

  - job_name: 'kube-state-metrics-fast'
    # Dedicated job at 5s, separate from whatever interval the chart's default
    # annotation-based service discovery would apply -- executor_oom's fault window is
    # 5-7s, so a 60s (or even a generic-job) interval has zero chance of reliably
    # catching the restart-count/last-terminated-reason signal this job exists to
    # observe. Deliberately scoped to only the kube-state-metrics Service (not cluster-
    # wide endpoint discovery like the chart's default kubernetes-service-endpoints
    # job) -- kube-state-metrics itself is low-cardinality (one series per pod/container
    # per metric, not per-request/per-topic like Kafka's JMX exporter), confirmed via
    # live series count before committing to 5s -- see commit history for the actual
    # measured number.
    scrape_interval: 5s
    scrape_timeout: 4s
    static_configs:
      - targets: ['prometheus-kube-state-metrics.monitoring.svc:8080']

  - job_name: 'spark-driver'
    metrics_path: /metrics/executors/prometheus/
    kubernetes_sd_configs:
      - role: pod
        namespaces:
            names: ["spark"]
    relabel_configs:
      - source_labels: [__meta_kubernetes_pod_label_spark_role]
        action: keep
        regex: driver
      - source_labels: [__meta_kubernetes_pod_container_port_name]
        action: keep
        regex: spark-ui
      - source_labels: [__meta_kubernetes_pod_ip]
        action: replace
        regex: '(.+)'
        replacement: '${1}:4040'
        target_label: __address__
      - source_labels: [__meta_kubernetes_pod_name]
        target_label: kubernetes_pod_name
