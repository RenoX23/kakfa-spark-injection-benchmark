# Phase 0 pilot: single Kafka broker (KRaft, combined controller+broker role).
# Adapted from Strimzi 1.1.0 examples/metrics/kafka-metrics.yaml — original example
# used 3 controller + 3 broker replicas; reduced to 1 combined node for the pilot,
# and replication factors dropped from 3 to 1 (a factor of 3 cannot be satisfied
# with only one broker — topic creation would fail under-replicated).
apiVersion: kafka.strimzi.io/v1
kind: KafkaNodePool
metadata:
  name: single
  labels:
    strimzi.io/cluster: kspfail
spec:
  replicas: 1
  roles:
    - controller
    - broker
  storage:
    type: jbod
    volumes:
      - id: 0
        type: ephemeral
        kraftMetadata: shared
---
apiVersion: kafka.strimzi.io/v1
kind: Kafka
metadata:
  name: kspfail
spec:
  kafka:
    version: 4.3.0
    metadataVersion: 4.3-IV0
    listeners:
      - name: plain
        port: 9092
        type: internal
        tls: false
    config:
      offsets.topic.replication.factor: 1
      transaction.state.log.replication.factor: 1
      transaction.state.log.min.isr: 1
      default.replication.factor: 1
      min.insync.replicas: 1
    metricsConfig:
      type: jmxPrometheusExporter
      valueFrom:
        configMapKeyRef:
          name: kafka-metrics
          key: kafka-metrics-config.yml
