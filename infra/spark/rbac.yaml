apiVersion: v1
kind: Namespace
metadata:
  name: spark
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: spark
  namespace: spark
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: spark-driver
  namespace: spark
rules:
  - apiGroups: [""]
    # deletecollection is a distinct verb from delete in K8s RBAC -- Spark's own
    # shutdown-cleanup bulk-deletes leftover executor pods/services/configmaps by
    # label selector, which requires deletecollection specifically. Missing it here
    # didn't stop the driver's own failure, but caused a cascade of additional
    # cleanup errors on every app exit and would leak orphaned resources over repeated
    # fault-injection runs (found during Weeks 2-3 broker-kill testing).
    resources: ["pods", "services", "configmaps", "persistentvolumeclaims"]
    verbs: ["get", "list", "watch", "create", "delete", "deletecollection", "update", "patch"]
  - apiGroups: [""]
    resources: ["pods/log"]
    verbs: ["get", "list"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: spark-driver-binding
  namespace: spark
subjects:
  - kind: ServiceAccount
    name: spark
    namespace: spark
roleRef:
  kind: Role
  name: spark-driver
  apiGroup: rbac.authorization.k8s.io
