# Spark's own spark.kubernetes.driver.volumes.* conf keys don't support type "configMap"
# (confirmed against the official running-on-kubernetes.html docs: only hostPath, emptyDir,
# nfs, persistentVolumeClaim are supported that way). The documented way to mount a ConfigMap
# into the driver pod is a pod template, merged by Spark into the driver pod it creates.
# Container name must be exactly "spark-kubernetes-driver" for the merge to apply.
apiVersion: v1
kind: Pod
spec:
  containers:
    - name: spark-kubernetes-driver
      volumeMounts:
        - name: spark-script-vol
          mountPath: /opt/spark-scripts
  volumes:
    - name: spark-script-vol
      configMap:
        name: spark-pilot-script
