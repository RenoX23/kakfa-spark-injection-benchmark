# One-off client that runs `spark-submit --deploy-mode cluster`. This process itself just
# talks to the K8s API once to launch the actual driver pod; the driver then creates its
# own executor pod(s) using the spark ServiceAccount's RBAC (infra/spark/rbac.yaml).
#
# Apply order for a from-scratch rebuild:
#   kubectl apply -f infra/spark/rbac.yaml
#   kubectl apply -f infra/spark/configmap-script.yaml
#   kubectl apply -f infra/spark/configmap-driver-pod-template.yaml
#   kubectl apply -f infra/spark/submit-pod.yaml
apiVersion: v1
kind: Pod
metadata:
  name: spark-submit-runner
  namespace: spark
spec:
  serviceAccountName: spark
  restartPolicy: Never
  containers:
    - name: spark-submit
      image: apache/spark:4.1.2-scala2.13-java17-python3-ubuntu
      command:
        - /opt/spark/bin/spark-submit
        - --master=k8s://https://kubernetes.default.svc
        - --deploy-mode=cluster
        - --name=kspfail-streaming-pilot
        - --conf=spark.kubernetes.namespace=spark
        - --conf=spark.kubernetes.authenticate.driver.serviceAccountName=spark
        - --conf=spark.kubernetes.container.image=apache/spark:4.1.2-scala2.13-java17-python3-ubuntu
        - --conf=spark.executor.instances=1
        - --conf=spark.driver.memory=768m
        - --conf=spark.executor.memory=768m
        - --conf=spark.kubernetes.driver.podTemplateFile=/opt/spark-conf/driver-pod-template.yaml
        # Default is max(numExecutors*2, 3) = 3 for spark.executor.instances=1 --
        # confirmed as the root cause of the 2026-07-11 "[INTERNAL_ERROR] Spark SQL
        # phase optimization failed" crashes (results/healer-validation/): Spark's own
        # executor-failure circuit breaker, not a flaky bug. That default protects a
        # production job from silently limping along after repeated real failures. A
        # controlled fault-injection campaign deliberately manufactures executor
        # failures on purpose (executor_oom is one of 5 locked fault classes), so the
        # production-safe default is wrong for this use case -- raised to 50, not
        # disabled, so a genuinely runaway failure loop unrelated to the campaign's own
        # injections would still trip it eventually.
        #
        # CORRECTED 2026-07-11 (same day): the key above was
        # spark.kubernetes.executor.maxNumFailures, which is NOT a real Spark config --
        # Spark silently ignores unrecognized --conf keys rather than erroring, so this
        # had zero effect. Confirmed via Apache Spark's own configuration.md (fetched
        # live, not assumed): the real, generic key since Spark 3.5.0 (SPARK-41210) is
        # spark.executor.maxNumFailures ("This configuration only takes effect on YARN
        # and Kubernetes"), same default max(numExecutors*2,3)=3. The wrong key
        # genuinely was set to 50 in the driver's live properties file (verified twice,
        # including in a PASSED gate audit) -- but verifying a key is SET is not the
        # same as verifying it's the RIGHT key, and that gap let a driver crash on
        # exactly its 4th executor failure again (2026-07-11T16:34:51Z, during the
        # executor_oom ramp-redesign calibration work) despite the "fix" appearing live
        # and correct by every check performed on it at the time.
        - --conf=spark.executor.maxNumFailures=50
        - --conf=spark.ui.prometheus.enabled=true
        - --conf=spark.sql.streaming.metricsEnabled=true
        - --conf=spark.jars.ivy=/tmp/ivy2
        - --packages=org.apache.spark:spark-sql-kafka-0-10_2.13:4.1.2
        - local:///opt/spark-scripts/structured_streaming_kafka_read.py
      volumeMounts:
        - name: driver-pod-template-vol
          mountPath: /opt/spark-conf
  volumes:
    - name: driver-pod-template-vol
      configMap:
        name: spark-driver-pod-template
